<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="options.css">
  <title>Bilingual Translate - Settings</title>
</head>
<body>
  <div class="options-container">
    <h1>Bilingual Translate Settings</h1>

    <section class="section">
      <h2>Translation Provider</h2>
      <div class="field">
        <label for="provider">Provider</label>
        <select id="provider">
          <option value="claude">Claude (Anthropic)</option>
          <option value="kimi">Kimi (Moonshot AI)</option>
          <option value="openai">OpenAI</option>
          <option value="gemini">Gemini (Google)</option>
          <option value="deepseek">DeepSeek</option>
          <option value="qwen">Qwen (通义千问)</option>
          <option value="doubao">Doubao (豆包)</option>
        </select>
      </div>
      <div class="field">
        <label for="apiKey">API Key</label>
        <div class="input-row">
          <input type="password" id="apiKey" placeholder="Enter your API key">
          <button id="toggleKey" class="btn-icon" title="Toggle visibility">Show</button>
        </div>
        <small>Your API key is encrypted and stored locally. It is never sent anywhere except the provider's API.</small>
      </div>
      <div class="field">
        <label for="model">Model</label>
        <select id="model">
          <option value="claude-sonnet-4-5-20250929">Claude Sonnet 4.5</option>
          <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 (Fast)</option>
          <option value="claude-opus-4-6">Claude Opus 4.6</option>
        </select>
      </div>
      <button id="verifyKey" class="btn">Verify API Key</button>
      <div id="verifyResult" class="result" style="display: none;"></div>
    </section>

    <section class="section">
      <h2>Translation Settings</h2>
      <div class="field">
        <label for="sourceLang">Source Language</label>
        <select id="sourceLang">
          <option value="auto">Auto Detect</option>
          <option value="en">English</option>
          <option value="zh-CN">Simplified Chinese</option>
          <option value="zh-TW">Traditional Chinese</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="es">Spanish</option>
        </select>
      </div>
      <div class="field">
        <label for="targetLang">Target Language</label>
        <select id="targetLang">
          <option value="zh-CN">Simplified Chinese</option>
          <option value="zh-TW">Traditional Chinese</option>
          <option value="en">English</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="es">Spanish</option>
        </select>
      </div>
    </section>

    <section class="section">
      <h2>Cache</h2>
      <p>Translations are cached locally to reduce API calls.</p>
      <button id="clearCache" class="btn btn-secondary">Clear Translation Cache</button>
      <div id="cacheResult" class="result" style="display: none;"></div>
    </section>

    <div class="actions">
      <button id="saveBtn" class="btn btn-primary">Save Settings</button>
      <span id="saveStatus" class="save-status"></span>
    </div>
  </div>

  <script src="options.js" type="module"></script>
</body>
</html>
